services:
  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - services/user_service/.env
    depends_on:
      - db
  
  db:
    image: postgres:16-alpine
    env_file:
      - services/user_service/.env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  product-service:
    build:
      context: .
      dockerfile: services/product_service/Dockerfile

volumes:
  postgres_data: