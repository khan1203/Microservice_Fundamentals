# version: '3.8'

services:
  # Jaeger Service for Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger_microservices
    ports:
      - "16686:16686" # The Web UI
      - "4317:4317"   # OTLP gRPC receiver port
  
  # RabbitMQ Service for Dead Letter Queue (DLQ) and messaging
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # API Gateway service for routing requests to microservices
  traefik:
    image: traefik:v2.11
    user: root
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # User Service
  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    ports:
      - "8001:8000"
    labels:
      traefik.enable: true
      traefik.http.routers.user_service.entrypoints: web
      traefik.http.routers.user_service.rule: PathPrefix(`/users`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`)
      traefik.http.services.user_service.loadbalancer.server.port: 8000
    env_file:
      - services/user_service/.env
    depends_on:
      - db
      - product-service
      - jaeger
    healthcheck:
      # We use Python's built-in urllib so we don't have to install 'curl' in the container
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/readiness')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  
  # Product Service
  product-service:
    build:
      context: .
      dockerfile: services/product_service/Dockerfile
    ports:
      - "8002:8000"

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "8003:8000" # Exposing directly for testing today
    depends_on:
      rabbitmq:
        condition: service_healthy
  
  # Inventory Service
  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8004:8000" # Exposing for easy testing
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Database Service
  db:
    image: postgres:16-alpine
    env_file:
      - services/user_service/.env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Grafana-Loki Service for centralized logging
  loki:
    image: grafana/loki:latest
    container_name: loki_microservices
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # Grafana-Promtail Service for log shipping
  promtail:
    image: grafana/promtail:latest
    container_name: promtail_microservices
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # Grafana Service for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_microservices
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin                # Default password
    depends_on:
      - loki

#--------------------------------------
# VOLUMES
#--------------------------------------
volumes:
  postgres_data: